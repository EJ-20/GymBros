<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 40" fill="none" role="img" aria-label="GymBros">
  <defs>
    <linearGradient id="lo-plate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bbf7d0" />
      <stop offset="45%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>
    <linearGradient id="lo-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="lo-bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="40%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="lo-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Mark: 48→40px -->
  <g transform="translate(1, 0) scale(0.833333)" filter="url(#lo-glow)">
    <rect x="2" y="11" width="13" height="26" rx="4" fill="url(#lo-plate)" />
    <rect x="4" y="13" width="4" height="22" rx="1.5" fill="url(#lo-shine)" />
    <rect x="3" y="12" width="11" height="24" rx="3.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" />
    <rect x="13" y="20.5" width="22" height="10" rx="5" fill="url(#lo-bar)" />
    <rect x="15" y="22" width="18" height="3.5" rx="1.5" fill="#ffffff" fill-opacity="0.22" />
    <rect x="19" y="21.5" width="10" height="8" rx="3" fill="#0f172a" fill-opacity="0.35" />
    <rect x="33" y="11" width="13" height="26" rx="4" fill="url(#lo-plate)" />
    <rect x="35" y="13" width="4" height="22" rx="1.5" fill="url(#lo-shine)" />
    <rect x="34" y="12" width="11" height="24" rx="3.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" />
  </g>
  <text
    x="48"
    y="28.5"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="21"
    font-weight="800"
    letter-spacing="-0.04em"
    fill="#f8fafc"
  >
    GymBros
  </text>
</svg>
