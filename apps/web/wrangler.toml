# Cloudflare Pages (connect Git in the dashboard)
# -----------------------------------------------
# Root directory: /  (repo root, not apps/web)
# Build command:     npm ci && npm run build --workspace=apps/web
# Build output:      apps/web/dist
#
# Leave "Deploy command" EMPTY. Do not use `npx wrangler deploy` — that targets
# Workers and fails in a monorepo root. Pages deploys the output folder automatically.
#
# Your site URL will be like https://<project>.pages.dev/ — keep VITE_BASE_PATH unset
# or set to / so Vite assets use root-relative URLs.

name = "gymbros-web"
compatibility_date = "2024-12-30"
pages_build_output_dir = "dist"
